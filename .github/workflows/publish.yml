name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Opt JS actions into Node 24 (silences the Node 20 deprecation warning for
# actions that don't yet ship a Node 24 release, e.g. setup-uv / upload-artifact).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! ls dist/ | grep -qE -- "-${TAG}(-|\.)"; then
            echo "::error::dist/ contents do not match tag v${TAG}"
            ls dist/
            exit 1
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: [build, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Build release notes from the commit log
        # Plain commit-log notes -- deliberately NOT --generate-notes, which
        # adds "by @user" attributions and a "New Contributors" section.
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          RANGE="${TAG}"
          [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          {
            git log --no-merges --pretty='- %s' "$RANGE" \
              | grep -viE '^- (Bump version|Sync uv\.lock)' || true
          } > NOTES.md
          [ -s NOTES.md ] || echo "- ${TAG}" > NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file NOTES.md \
            dist/*
