name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - run: uv build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! ls dist/ | grep -qE -- "-${TAG}(-|\.)"; then
            echo "::error::dist/ contents do not match tag v${TAG}"
            ls dist/
            exit 1
          fi

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Build release notes from the commit log
        if: startsWith(github.ref, 'refs/tags/v')
        # Plain commit-log notes -- deliberately NOT --generate-notes, which
        # adds "by @user" attributions and a "New Contributors" section.
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          RANGE="${TAG}"
          [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          {
            git log --no-merges --pretty='- %s' "$RANGE" \
              | grep -viE '^- (Bump version|Sync uv\.lock)' || true
          } > NOTES.md
          [ -s NOTES.md ] || echo "- ${TAG}" > NOTES.md
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file NOTES.md \
            dist/*
